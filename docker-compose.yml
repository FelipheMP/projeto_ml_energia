services:
  api:
    build: .
    image: projeto-ml-energia:latest
    container_name: energia-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models_saved:/app/models_saved
      - ./metrics:/app/metrics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build: .
    image: projeto-ml-energia:latest
    container_name: energia-dashboard
    command: >
      streamlit run dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
    ports:
      - "8501:8501"
    volumes:
      - ./models_saved:/app/models_saved
      - ./metrics:/app/metrics
    restart: unless-stopped
    depends_on:
      - api

  train:
    build: .
    image: projeto-ml-energia:latest
    container_name: energia-train
    command: python main.py
    volumes:
      - ./data:/app/data
      - ./models_saved:/app/models_saved
      - ./metrics:/app/metrics
    profiles:
      - train
    restart: "no"
